<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#EBEEF4; --surface:#FFFFFF; --surface-2:#F6F8FB; --surface-3:#EEF2F8;
    --border:#E0E6EF; --border-2:#D2DAE6;
    --ink:#0E1828; --ink-2:#16233A;
    --text:#142033; --muted:#5E6B7E; --muted-2:#8A94A4;
    --accent:#F5B301; --accent-deep:#B98400; --accent-soft:#FFF4D2;
    --pos:#0E9D6B; --pos-soft:#E2F5EE;
    --neg:#DD3A2F; --neg-soft:#FBE6E4;
    --info:#2D6BE0; --info-soft:#E5EEFC;
    --warn:#E08A12; --warn-soft:#FCEED8;
    --shadow:0 1px 2px rgba(16,26,42,.04),0 4px 16px rgba(16,26,42,.06);
    --shadow-lg:0 12px 40px rgba(16,26,42,.18);
    --r:14px; --r-sm:10px;
  }
  body.dark{
    --bg:#0C1422; --surface:#141E2D; --surface-2:#1A2536; --surface-3:#212F44;
    --border:#27344A; --border-2:#34435E;
    --ink:#E9EFF7; --ink-2:#1C2940;
    --text:#E3EAF3; --muted:#9AA7BA; --muted-2:#76859B;
    --accent-soft:#3a2f12;
    --pos-soft:#0f2b25; --neg-soft:#3a1f1d; --info-soft:#152a44; --warn-soft:#34290f;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.38);
    --shadow-lg:0 16px 44px rgba(0,0,0,.55);
  }
  body.dark .rail{background:#0A1120}
  body.dark .btn-pri{background:#0A1120;border-color:#0A1120;color:#fff}
  body.dark .btn-pri:hover{background:#101B2C;border-color:#101B2C}
  body.dark .toast{background:#05080d}
  body.dark .topbar{background:rgba(12,20,34,.85)}
  body.dark .chip-pos{color:#3fd9a3}
  body.dark .chip-neg{color:#f6877d}
  body.dark .chip-info{color:#8fb5f3}
  body.dark .chip-warn{color:#f0b860}
  body.dark .chip-acc{color:#f5c451}
  body.dark .chip-mut{color:var(--muted)}
  body.dark .lead,body.dark .kcol{box-shadow:none}
  body.dark input::placeholder,body.dark textarea::placeholder{color:#5d6b80}
  body.dark ::-webkit-scrollbar-thumb{background:#2a3a52;border-color:var(--bg)}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
  }
  .tnum{font-variant-numeric:tabular-nums}
  .mono-num{font-family:"Space Grotesk",Inter,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  h1,h2,h3,h4{font-family:"Space Grotesk",Inter,sans-serif;margin:0;font-weight:600;color:var(--ink)}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#C4CDDB;border-radius:8px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#A9B5C7}

  /* ---------- Shell ---------- */
  .app{display:flex;min-height:100vh}
  .rail{
    width:236px;flex:0 0 236px;background:var(--ink);color:#C3CCDA;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:20px 18px 18px}
  .mark{width:34px;height:34px;flex:0 0 34px}
  .brand .bt{display:flex;flex-direction:column;line-height:1.1}
  .brand .bt b{font-family:"Space Grotesk";color:#fff;font-size:16px;font-weight:600;letter-spacing:.2px}
  .brand .bt span{font-size:10.5px;color:#7E8AA0;letter-spacing:.06em;text-transform:uppercase}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 12px;overflow-y:auto;flex:1}
  .nav::-webkit-scrollbar-thumb{background:#2A3B55}
  .navi{
    display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
    color:#AEB9CA;font-size:13.5px;font-weight:500;border:none;background:none;
    text-align:left;width:100%;transition:.12s;position:relative;
  }
  .navi svg{width:17px;height:17px;flex:0 0 17px;opacity:.85}
  .navi:hover{background:#19273D;color:#E6EBF2}
  .navi.on{background:#1E2F49;color:#fff}
  .navi.on::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
  .navi .badge{margin-left:auto;background:var(--accent);color:#3A2B00;font-size:10.5px;font-weight:700;
    padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
  .rail-foot{padding:14px}
  .rail-foot{border-top:1px solid #1D2A40;display:flex;align-items:center;gap:10px}
  .ava{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#F5B301,#E08A12);
    color:#3A2B00;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:12.5px}
  .rail-foot .ut{line-height:1.2}
  .rail-foot .ut b{color:#fff;font-size:12.5px;font-weight:600;display:block}
  .rail-foot .ut span{color:#7E8AA0;font-size:11px}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:16px;padding:15px 28px;background:rgba(235,238,244,.82);
    backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);
  }
  .topbar .pt{flex:1;min-width:0}
  .topbar .pt h1{font-size:20px;letter-spacing:-.01em}
  .topbar .pt p{margin:1px 0 0;color:var(--muted);font-size:12.5px}
  .top-actions{display:flex;align-items:center;gap:9px}
  .pulse{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);
    background:var(--surface);border:1px solid var(--border);padding:6px 11px;border-radius:20px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 3px var(--pos-soft)}
  .content{padding:22px 28px 60px;max-width:1320px;width:100%;margin:0 auto;flex:1}

  /* ---------- Buttons / chips ---------- */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;
    border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:13px;font-weight:550;transition:.12s}
  .btn:hover{background:var(--surface-2);border-color:#C0CAD8}
  .btn svg{width:15px;height:15px}
  .btn-pri{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn-pri:hover{background:#1B2B43;border-color:#1B2B43}
  .btn-acc{background:var(--accent);border-color:var(--accent-deep);color:#3A2B00;font-weight:650}
  .btn-acc:hover{background:#E9A800}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn-ghost{border-color:transparent;background:transparent}
  .btn-ghost:hover{background:var(--surface-3)}

  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
    padding:3px 9px;border-radius:7px;white-space:nowrap}
  .chip-pos{background:var(--pos-soft);color:#0A7A52}
  .chip-neg{background:var(--neg-soft);color:#B62B22}
  .chip-info{background:var(--info-soft);color:#1E4FA8}
  .chip-warn{background:var(--warn-soft);color:#9A5C06}
  .chip-mut{background:var(--surface-3);color:var(--muted)}
  .chip-acc{background:var(--accent-soft);color:var(--accent-deep)}

  .delta{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums}
  .delta svg{width:12px;height:12px}
  .up{color:#0A7A52}.down{color:#B62B22}

  /* ---------- Cards / grid ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:10px;padding:15px 18px 0}
  .card-h h3{font-size:14px}
  .card-h .sub{color:var(--muted);font-size:11.5px;margin-left:auto}
  .grid{display:grid;gap:16px}
  .sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted-2);
    font-weight:600;margin:26px 2px 12px;display:flex;align-items:center;gap:8px}
  .sec-title:first-child{margin-top:4px}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:550;display:flex;align-items:center;gap:6px}
  .kpi .lbl .ic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--surface-3)}
  .kpi .lbl .ic svg{width:13px;height:13px;color:var(--muted)}
  .kpi .val{font-family:"Space Grotesk";font-size:25px;font-weight:600;color:var(--ink);margin:9px 0 4px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .kpi .foot{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
  .kpi.hl{background:linear-gradient(160deg,#13233A,#0E1828);border-color:#0E1828;color:#fff}
  .kpi.hl .lbl,.kpi.hl .foot{color:#9DAAC0}
  .kpi.hl .val{color:#fff}
  .kpi.hl .ic{background:#21314C}.kpi.hl .ic svg{color:var(--accent)}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);
    font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border)}
  td{padding:11px 14px;border-bottom:1px solid var(--surface-3);font-size:13px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .tw{overflow:hidden;border-radius:var(--r)}

  /* status dot pills */
  .st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:550}
  .st::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.9}

  /* ---------- Kanban ---------- */
  .kan{display:flex;gap:13px;overflow-x:auto;padding:4px 2px 16px;align-items:flex-start}
  .kcol{flex:0 0 254px;background:var(--surface-3);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:74vh}
  .kcol-h{padding:11px 13px 9px;display:flex;align-items:center;gap:8px;position:sticky;top:0}
  .kcol-h .nm{font-size:12.5px;font-weight:650;color:var(--ink)}
  .kcol-h .ct{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:0 7px;border-radius:20px;font-weight:600}
  .kcol-h .bar{width:100%;height:3px;border-radius:3px;margin-top:0}
  .kbody{padding:4px 9px 11px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1;min-height:34px}
  .kbody.drop{background:var(--accent-soft);outline:2px dashed var(--accent);outline-offset:-4px;border-radius:8px}
  .lead{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px;box-shadow:0 1px 2px rgba(16,26,42,.05);cursor:grab}
  .lead:active{cursor:grabbing}
  .lead.drag{opacity:.4}
  .lead .ln{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .lead .lm{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .lead .lf{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px}
  .lead .val{font-family:"Space Grotesk";font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
  .mini-ava{width:21px;height:21px;border-radius:6px;background:var(--ink-2);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}

  /* ---------- Lists ---------- */
  .list{display:flex;flex-direction:column}
  .li{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--surface-3)}
  .li:last-child{border-bottom:none}
  .li:hover{background:var(--surface-2)}
  .check{width:19px;height:19px;border-radius:6px;border:1.6px solid var(--border-2);flex:0 0 19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  .check.done{background:var(--pos);border-color:var(--pos)}
  .check.done svg{width:12px;height:12px;color:#fff}
  .check svg{display:none}.check.done svg{display:block}

  /* client cards */
  .ccards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.14s}
  .ccard:hover{border-color:#C3CDDC;transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .ccard .ch{display:flex;align-items:center;gap:11px}
  .logo{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk";font-weight:600;font-size:16px;color:#fff;flex:0 0 42px}
  .ccard .cb{margin-top:13px;display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--surface-3)}
  .health{display:flex;align-items:center;gap:7px}
  .hbar{width:46px;height:6px;border-radius:6px;background:var(--surface-3);overflow:hidden}
  .hbar i{display:block;height:100%;border-radius:6px}

  /* ---------- Gauge / dashboard health ---------- */
  .health-hero{background:linear-gradient(155deg,#16273F 0%,#0E1828 60%);border-radius:var(--r);
    padding:20px 22px;color:#fff;display:flex;align-items:center;gap:26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .health-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;
    background:radial-gradient(circle,rgba(245,179,1,.16),transparent 70%)}
  .gauge{position:relative;flex:0 0 156px;text-align:center}
  .gauge .num{position:absolute;left:0;right:0;top:54px;font-family:"Space Grotesk";font-size:38px;font-weight:600}
  .gauge .cap{position:absolute;left:0;right:0;top:96px;font-size:11px;color:#9DAAC0;letter-spacing:.05em;text-transform:uppercase}
  .hh-body{flex:1}
  .hh-body h2{color:#fff;font-size:17px}
  .hh-body p{color:#9DAAC0;font-size:12.5px;margin:3px 0 13px;max-width:430px}
  .hh-stats{display:flex;gap:26px;flex-wrap:wrap}
  .hh-stat .v{font-family:"Space Grotesk";font-size:19px;font-weight:600;font-variant-numeric:tabular-nums}
  .hh-stat .l{font-size:11px;color:#8593AB}
  .ring{display:flex;flex-direction:column;gap:8px;flex:0 0 224px}
  .ring .rrow{display:flex;align-items:center;gap:9px;font-size:11.5px}
  .ring .rrow .rl{width:96px;color:#9DAAC0}
  .ring .rrow .rt{flex:1;height:5px;border-radius:5px;background:#23344F;overflow:hidden}
  .ring .rrow .rt i{display:block;height:100%;border-radius:5px}
  .ring .rrow .rv{font-family:"Space Grotesk";font-variant-numeric:tabular-nums;width:26px;text-align:right}

  /* alerts */
  .alert{display:flex;gap:11px;padding:12px 14px;border-bottom:1px solid var(--surface-3)}
  .alert:last-child{border-bottom:none}
  .alert .ai{width:30px;height:30px;border-radius:8px;flex:0 0 30px;display:flex;align-items:center;justify-content:center}
  .alert .ai svg{width:15px;height:15px}
  .alert .at{font-size:13px;font-weight:600;color:var(--ink)}
  .alert .ad{font-size:12px;color:var(--muted);margin-top:1px}

  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:7px;padding:14px 18px 18px}
  .frow{display:flex;align-items:center;gap:12px}
  .frow .fl{width:118px;font-size:12.5px;color:var(--muted);font-weight:500}
  .fbar{flex:1;height:30px;border-radius:8px;background:var(--surface-3);position:relative;overflow:hidden}
  .fbar i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,#243B5C,#3D5C8C)}
  .fbar i{background:linear-gradient(90deg,#243B5C,#3D5C8C)}
  .fbar span{position:absolute;left:11px;top:0;height:100%;display:flex;align-items:center;color:#fff;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
  .frow .fv{width:54px;text-align:right;font-family:"Space Grotesk";font-weight:600;font-variant-numeric:tabular-nums}
  .frow .fp{width:48px;text-align:right;font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* ---------- Modal / drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(14,24,40,.46);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:.18s}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:94vw;background:var(--surface);
    z-index:70;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:.24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .dw-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:13px}
  .dw-b{padding:20px 22px;overflow-y:auto;flex:1}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-46%) scale(.97);z-index:70;background:var(--surface);
    border-radius:16px;width:460px;max-width:94vw;max-height:90vh;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.16s;display:flex;flex-direction:column}
  .modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .modal .dw-b{max-height:70vh}
  .x{margin-left:auto;width:32px;height:32px;border-radius:8px;border:none;background:var(--surface-3);color:var(--muted);display:flex;align-items:center;justify-content:center}
  .x:hover{background:var(--border)}.x svg{width:16px;height:16px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border-2);
    border-radius:9px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:64px}
  .frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);padding:0 22px;margin-top:2px}
  .tab{padding:11px 12px;font-size:13px;font-weight:550;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent)}

  .meta{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px;margin-top:6px}
  .meta .m label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-2);font-weight:600}
  .meta .m div{font-size:13.5px;font-weight:500;color:var(--text);margin-top:3px}

  .timeline{position:relative;padding-left:22px}
  .timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--surface-3)}
  .tl{position:relative;padding:0 0 16px 4px}
  .tl::before{content:"";position:absolute;left:-22px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2.5px solid var(--accent)}
  .tl .td{font-size:11px;color:var(--muted-2);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .tl .tt{font-size:13px;color:var(--text);margin-top:2px}

  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty svg{width:34px;height:34px;opacity:.4;margin-bottom:10px}

  .seg{display:inline-flex;background:var(--surface-3);border-radius:9px;padding:3px;gap:2px}
  .seg button{border:none;background:none;padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:550;color:var(--muted)}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .checklist{display:flex;flex-direction:column;gap:2px}
  .cli{display:flex;align-items:center;gap:11px;padding:9px 0}
  .cli .nm{font-size:13px}
  .cli.done .nm{color:var(--muted-2);text-decoration:line-through}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;
    z-index:90;opacity:0;pointer-events:none;transition:.2s;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:16px;height:16px;color:var(--accent)}

  @media(max-width:1080px){
    .kpis{grid-template-columns:repeat(2,1fr)}.ccards{grid-template-columns:repeat(2,1fr)}
    .health-hero{flex-wrap:wrap}.ring{flex-basis:100%}
  }
  @media(max-width:760px){
    .rail{position:fixed;left:0;z-index:50;transform:translateX(-100%);transition:.2s}
    .rail.open{transform:translateX(0)}
    .menu-btn{display:flex!important}
    .content{padding:16px 14px 50px}.topbar{padding:13px 16px}
    .kpis{grid-template-columns:1fr}.ccards{grid-template-columns:1fr}.frow2{grid-template-columns:1fr}
  }
  .menu-btn{display:none;width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--surface);align-items:center;justify-content:center}
  .menu-btn svg{width:18px;height:18px}
</style>

const BRL = n => 'R$ '+(Math.round(n)).toLocaleString('pt-BR');
const BRLk = n => n>=1000 ? 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k' : 'R$ '+Math.round(n);
const pct = n => (n).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%';
const initials = s => s.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const LOGO_COLORS=['#2D6BE0','#0E9D6B','#E08A12','#8B5CF6','#DD3A2F','#0891B2','#DB2777','#475569'];
const colorFor = s => LOGO_COLORS[[...s].reduce((a,c)=>a+c.charCodeAt(0),0)%LOGO_COLORS.length];
const uid = ()=> 'id'+Math.random().toString(36).slice(2,9);
const today = new Date('2026-06-22');
function daysAgo(n){const d=new Date(today);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}
function daysAhead(n){const d=new Date(today);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function fmtDate(s){if(!s)return '—';const [y,m,d]=s.split('-');return `${d}/${m}/${y.slice(2)}`}
function nowISO(){return new Date().toISOString()}
function fmtDT(iso){const d=new Date(iso);if(isNaN(d))return iso;return d.toLocaleDateString('pt-BR')+' às '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function monthKey(s){return (s||'').slice(0,7)}
function monthLabel(k){if(!k)return '';const [y,m]=k.split('-');return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+m-1]+'/'+y.slice(2)}
function addMonths(s,n){if(!s)return s;const d=new Date(s);d.setMonth(d.getMonth()+Number(n||0));return d.toISOString().slice(0,10)}
function digits(s){return (s||'').replace(/\D/g,'')}
function waLink(phone){let d=digits(phone);if(!d)return '';if(d.length<=11)d='55'+d;return 'https://wa.me/'+d}
function telLink(phone){let d=digits(phone);if(!d)return '';return 'tel:+'+(d.length<=11?'55':'')+d}
function maskPhone(el){let d=digits(el.value).slice(0,11);let o='';if(d.length>0)o='('+d.slice(0,2);if(d.length>=3)o+=') '+d.slice(2,d.length>10?7:6);if(d.length>(d.length>10?7:6))o+='-'+d.slice(d.length>10?7:6,11);el.value=o}
function contactBtns(c){const wl=waLink(c.whatsapp||c.telefone),tl=telLink(c.telefone||c.whatsapp);
  return `<div style="display:flex;gap:9px;margin:4px 0 4px">
    ${wl?`<a href="${wl}" target="_blank" rel="noopener" class="btn" style="flex:1;justify-content:center;color:#0A7A52;border-color:var(--pos-soft)">${ic('wa')}WhatsApp</a>`:''}
    ${tl?`<a href="${tl}" class="btn" style="flex:1;justify-content:center">${ic('phone')}Ligar</a>`:''}</div>`}

let session=null; // id do usuário logado neste dispositivo

function curUser(){return ((DB&&DB.equipe)||[]).find(e=>e.id===session && e.ativo!==false)||null}

function canSeeAll(){return curRole()==='ceo'}
function curPerms(){const u=curUser();if(!u)return {};return u.perfil==='ceo'?Object.fromEntries(PERM_AREAS.map(a=>[a[0],true])):(u.permissoes||permsFor(u.perfil))}
function setSession(id){session=id;try{localStorage.setItem('falcon_session',id||'')}catch(e){}}

/* ---- Filtros de visibilidade por responsável ---- */
function vLeads(){if(canSeeAll())return DB.leads;const me=curName();return DB.leads.filter(l=>UNIVERSAL_STAGES.includes(l.stage)||l.responsavel===me)}
function vClients(){if(canSeeAll())return DB.clients;const me=curName();return DB.clients.filter(c=>c.responsavel===me)}
function vTarefas(){if(canSeeAll())return DB.tarefas;const me=curName();return DB.tarefas.filter(t=>t.responsavel===me)}
function vAgenda(){if(canSeeAll())return DB.agenda;const me=curName();return DB.agenda.filter(a=>a.responsavel===me)}
function vOperacoes(){if(canSeeAll())return DB.operacoes;const me=curName();return DB.operacoes.filter(o=>o.responsavel===me)}
function vReunioes(){if(canSeeAll())return DB.reunioes;const me=curName();return DB.reunioes.filter(r=>r.responsavel===me||(r.participantes||'').includes(me))}
function clientOwner(empresa){const c=DB.clients.find(x=>x.empresa===empresa);return c?c.responsavel:null}
function vContasReceber(){if(canSeeAll())return DB.contasReceber;const me=curName();return DB.contasReceber.filter(c=>(c.responsavel||clientOwner(c.cliente))===me)}
function vContasPagar(){if(canSeeAll())return DB.contasPagar;const me=curName();return DB.contasPagar.filter(c=>c.responsavel===me)}
function vLog(){if(canSeeAll())return DB.log||[];const me=curName();return (DB.log||[]).filter(x=>x.autor===me||x.responsavel===me)}
function logEvent(area,texto,responsavel){(DB.log=DB.log||[]).unshift({ts:nowISO(),autor:curName()||'Sistema',area,texto,responsavel:responsavel||curName()});if(DB.log.length>800)DB.log.length=800}
function daysInStage(l){const base=l.stageSince||l.ultimaInteracao||daysAgo(0);const d=Math.floor((today-new Date(base))/864e5);return d<0?0:d}
function repOptions(sel){return DB.equipe.filter(e=>e.ativo!==false).map(e=>`<option ${sel===e.nome?'selected':''}>${e.nome}</option>`).join('')}
function emptyState(icon,title,sub,btnLabel,btnFn){
  return `<div class="card"><div class="empty">${ic(icon)}
    <div style="font-weight:600;font-size:15px;color:var(--ink)">${title}</div>
    <div style="margin-top:4px;max-width:340px;margin-left:auto;margin-right:auto">${sub}</div>
    ${btnLabel?`<button class="btn btn-acc" style="margin-top:14px" onclick="${btnFn}">${ic('plus')}${btnLabel}</button>`:''}</div></div>`;
}
function toast(msg){const t=document.getElementById('toast');t.innerHTML=ic('check')+msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200)}

function canLocal(){try{localStorage.setItem('__falcon_t','1');localStorage.removeItem('__falcon_t');return true}catch(e){return false}}

async function initPersistence(){
  try{
    if(typeof firebase!=='undefined' && firebase.initializeApp){
      firebase.initializeApp(firebaseConfig);
      fdb=firebase.firestore();
      docRef=fdb.collection('crm').doc('main');
      // teste de leitura rápido para confirmar conexão
      await docRef.get();
      persistMode='firebase';
      return;
    }
  }catch(e){console.warn('Firebase indisponível, usando fallback:',e&&e.message);}
  persistMode = canLocal() ? 'local' : 'memory';
}

async function load(){
  if(persistMode==='firebase'){
    try{
      const snap=await docRef.get();
      if(snap.exists && snap.data() && snap.data().json){DB=JSON.parse(snap.data().json);migrate();}
      else {DB=emptyDB(); await save();}
      // sincronização em tempo real entre dispositivos
      docRef.onSnapshot(s=>{
        if(!s.exists||!s.data()||!s.data().json)return;
        if(s.metadata.hasPendingWrites)return;           // ignora a própria gravação
        if(document.getElementById('scrim').classList.contains('on'))return; // não interrompe edição
        try{const inc=s.data().json; if(inc!==JSON.stringify(DB)){DB=JSON.parse(inc);render();}}catch(e){}
      });
      return;
    }catch(e){console.warn('Falha ao ler do Firebase, fallback:',e&&e.message);persistMode=canLocal()?'local':'memory';}
  }
  if(persistMode==='local'){
    try{const raw=localStorage.getItem(KEY);
      if(raw){DB=JSON.parse(raw);migrate();return}}catch(e){}
    DB=emptyDB(); save(); return;
  }
  DB=emptyDB(); // memória (preview)
}
function migrate(){
  let changed=false;
  const roleMap={'Owner / CEO':'ceo','Comercial':'sdr','Operação':'bdr','Financeiro':'financeiro','Administrador':'ceo'};
  (DB.leads||[]).forEach(l=>{
    if(!l.atividade){l.atividade=[{ts:(l.ultimaInteracao||daysAgo(0))+'T10:30:00',tipo:'etapa',texto:'Entrou na etapa "'+(STAGES.find(s=>s[0]===l.stage)||['','—'])[1]+'"',autor:l.responsavel||'—'}];changed=true}
    if(!l.stageSince){l.stageSince=l.ultimaInteracao||daysAgo(0);changed=true}
    if(!l.tags){l.tags=[];changed=true}
    if(!l.criado){l.criado=l.stageSince||daysAgo(0);changed=true}
  });
  (DB.clients||[]).forEach(c=>{
    if(c.contato===undefined){c.contato=c.responsavel||'';c.responsavel='';changed=true} // separa contato (pessoa) de responsável (equipe)
    if(c.contrato){if(c.contrato.fidelidadeMeses===undefined){c.contrato.fidelidadeMeses=0;changed=true}if(c.contrato.link===undefined){c.contrato.link='';changed=true}}
    if(c.nota===undefined){c.nota='';changed=true}
    if(!c.tags){c.tags=[];changed=true}
  });
  (DB.equipe||[]).forEach(e=>{
    if(roleMap[e.perfil]){e.perfil=roleMap[e.perfil];e.permissoes=permsFor(e.perfil);changed=true}
    if(!e.permissoes){e.permissoes=permsFor(e.perfil);changed=true}
    if(e.ativo===undefined){e.ativo=true;changed=true}
    if(e.senha===undefined){e.senha='';changed=true}
    if(e.comissaoPct===undefined){e.comissaoPct=0;changed=true}
  });
  if(DB.saldoAjuste===undefined){DB.saldoAjuste=0;changed=true}
  if(!DB.series){DB.series=emptyDB().series;changed=true}
  if(!DB.perfil){DB.perfil={nome:'',empresa:''};changed=true}
  if(!DB.log){DB.log=[];changed=true}
  if(!DB.metas){DB.metas={leads:0,fechamentos:0,mrr:0};changed=true}
  if(!DB.operacoes){DB.operacoes=[];changed=true}
  if(!DB.metasFech){DB.metasFech={};changed=true}
  if(!DB.painel){DB.painel={};changed=true}
  if(Array.isArray(DB.leads)){const cl0=DB.leads.filter(l=>l.stage==='fechados');if(cl0.length){cl0.forEach(l=>{DB.clients.unshift(leadToClient(l,{status:'Ativo',closedAt:l.stageSince||l.criado||daysAgo(0),closedValue:l.valor||0,implantacao:0,mensal:0}));});DB.leads=DB.leads.filter(l=>l.stage!=='fechados');changed=true;}}
  (DB.clients||[]).forEach(c=>{if(c.status==='Implantação'&&ensureOperacao(c))changed=true});
  if(changed)save();
}
async function save(){
  try{
    if(persistMode==='firebase' && docRef){await docRef.set({json:JSON.stringify(DB),updatedAt:Date.now()});}
    else if(persistMode==='local'){localStorage.setItem(KEY,JSON.stringify(DB));}
  }catch(e){console.warn('save failed',e)}
}

function metrics(){
  const cl=vClients(), cr=vContasReceber(), cp=vContasPagar(), LE=vLeads();
  const ativos=cl.filter(c=>c.status==='Ativo');
  const mrr=ativos.reduce((s,c)=>s+c.contrato.mensal,0);
  const sum=(arr,f)=>arr.reduce((s,x)=>s+(f(x)?x.valor:0),0);
  const recebida=sum(cr,x=>x.status==='Pago');
  const prevista=sum(cr,x=>x.status!=='Cancelado');
  const aberta=sum(cr,x=>x.status==='Aberto'||x.status==='Atrasado');
  const atrasadoVal=sum(cr,x=>x.status==='Atrasado');
  const inadCount=new Set(cr.filter(x=>x.status==='Atrasado').map(x=>x.cliente)).size;
  const inadPct=prevista?atrasadoVal/prevista*100:0;
  const despPagas=sum(cp,x=>x.status==='Pago');
  const despFut=sum(cp,x=>x.status!=='Pago'&&x.status!=='Cancelado');
  const lucro=recebida-despPagas;
  const ticket=ativos.length?mrr/ativos.length:0;
  const ltv=ticket*18; // assumindo retenção média de 18 meses
  const saldo=recebida-despPagas+(DB.saldoAjuste||0);
  const saldoProj=saldo+aberta-despFut;
  // funnel — "fechados" agora é cliente fechado no mês (closedAt)
  const cm=monthKey(daysAgo(0));
  const fech=cl.filter(c=>c.closedAt&&monthKey(c.closedAt)===cm).length;
  const st=s=>LE.filter(l=>l.stage===s).length;
  const novos=st('novos'), agend=st('agend')+st('conf')+st('compar')+st('prop');
  const compar=st('compar')+st('prop');
  const totalLeads=LE.filter(l=>l.stage!=='perdidos'&&l.stage!=='reativ').length+fech;
  const txConv=totalLeads?fech/totalLeads*100:0;
  const txCompar=agend?compar/agend*100:0;
  const txFech=compar?fech/compar*100:0;
  // composite health
  const saudeAvg=Math.round(ativos.reduce((s,c)=>s+c.saude,0)/(ativos.length||1));
  const compH=Math.min(100,txCompar), convH=Math.min(100,txConv*3.2), inadH=Math.max(0,100-inadPct*3);
  const hasData = cl.length>0 || LE.length>0 || cr.length>0;
  const composite = hasData ? Math.round(saudeAvg*.4+compH*.2+convH*.2+inadH*.2) : 0;
  const pillars = hasData
    ? {Comparecimento:Math.round(compH),Conversão:Math.round(Math.min(100,convH)),
       Crescimento:Math.min(100,Math.round(mrr/16000*100)),Relacionamento:saudeAvg,Inadimplência:Math.round(inadH)}
    : {Comparecimento:0,Conversão:0,Crescimento:0,Relacionamento:0,Inadimplência:0};
  return {hasData,ativos:ativos.length,mrr,recebida,prevista,aberta,atrasadoVal,inadCount,inadPct,despPagas,despFut,
    lucro,ticket,ltv,saldo,saldoProj,novos,agend,compar,fech,txConv,txCompar,txFech,saudeAvg,composite,
    leadsMes:LE.length,pillars};
}

  });
  vClients().filter(c=>c.status==='Ativo').forEach(c=>{
    const last=c.historico&&c.historico[0]?(c.historico[0].data||(c.historico[0].ts||'').slice(0,10)):'2000-01-01';
    const dd=Math.round((today-new Date(last))/864e5);
    if(dd>20)A.push(['info','phone',`${c.empresa} sem contato`,`Última interação há ${dd} dias. Toque para abrir.`,`openClient('${c.id}')`]);
  });
  if(!A.length)A.push(['pos','check','Tudo sob controle','Nenhum alerta crítico no momento.',""]);
  const map={neg:['var(--neg-soft)','var(--neg)'],warn:['var(--warn-soft)','var(--warn)'],info:['var(--info-soft)','var(--info)'],pos:['var(--pos-soft)','var(--pos)']};
  return A.slice(0,5).map(a=>`<div class="alert" ${a[4]?`role="button" tabindex="0" style="cursor:pointer" onclick="${a[4]}"`:''}><div class="ai" style="background:${map[a[0]][0]};color:${map[a[0]][1]}">${ic(a[1])}</div>
    <div style="flex:1"><div class="at">${a[2]}</div><div class="ad">${a[3]}</div></div>${a[4]?`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--muted-2)" stroke-width="2" style="align-self:center"><path d="M9 18l6-6-6-6"/></svg>`:''}</div>`).join('');

const STAGES=[

function viewPipeline(v){

function miniStat(l,v){return `<div class="card" style="padding:13px 16px;flex:1;min-width:150px"><div style="font-size:11.5px;color:var(--muted)">${l}</div><div class="mono-num" style="font-size:21px;font-weight:600;color:var(--ink);margin-top:3px">${v}</div></div>`}
function stageCol(s){
  const leads=vLeads().filter(l=>l.stage===s[0]).sort((a,b)=>daysInStage(b)-daysInStage(a));
  const val=leads.reduce((a,l)=>a+l.valor,0);
  const universal=UNIVERSAL_STAGES.includes(s[0]);
  return `<div class="kcol">
    <div class="kcol-h"><span class="nm">${s[1]}</span><span class="ct">${leads.length}</span>

    </div></div>`;
}
function leadCard(l){
  const dias=daysInStage(l);
  const canRescue=['perdidos','reativ'].includes(l.stage);
  const owned=l.responsavel===curName() && !UNIVERSAL_STAGES.includes(l.stage);
  return `<div class="lead" draggable="true" data-id="${l.id}" onclick="openLead('${l.id}')">
    <div class="ln">${l.nome}</div>
    <div class="lm"><span class="chip chip-mut">${l.origem}</span>
      <span class="chip ${dias>=14?'chip-neg':dias>=7?'chip-warn':'chip-mut'}" title="Dias neste estágio">${dias}d no estágio</span></div>
    ${(l.tags&&l.tags.length)?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${l.tags.map(t=>`<span class="chip chip-acc" style="font-size:10px;padding:1px 6px">${t}</span>`).join('')}</div>`:''}
    <div class="lf"><span class="mini-ava" title="${l.responsavel||'Sem responsável'}">${l.responsavel?initials(l.responsavel):'—'}</span><span class="val">${BRL(l.valor)}</span></div>
    ${canRescue?`<button class="btn btn-sm btn-acc" style="width:100%;margin-top:9px;justify-content:center" onclick="event.stopPropagation();rescueLead('${l.id}')">${ic('hand')}Resgatar</button>`:''}
    ${owned?`<button class="btn btn-sm" style="width:100%;margin-top:9px;justify-content:center" onclick="event.stopPropagation();releaseLead('${l.id}')">${ic('unlock')}Soltar lead</button>`:''}
    ${(!['perdidos','reativ'].includes(l.stage))?`<button class="btn btn-sm" style="width:100%;margin-top:9px;justify-content:center;background:var(--pos);border-color:var(--pos);color:#fff" onclick="event.stopPropagation();fecharNegocio('${l.id}')">${ic('check')}Fechar negócio</button>`:''}
  </div>`;
}
function rescueLead(id){
  const l=DB.leads.find(x=>x.id===id);if(!l)return;
  if(!curName()){toast('Faça login para resgatar');return;}
  const from=STAGES.find(s=>s[0]===l.stage)[1];
  l.responsavel=curName();l.stage='resgatado';l.stageSince=daysAgo(0);l.ultimaInteracao=daysAgo(0);
  (l.atividade=l.atividade||[]).unshift({ts:nowISO(),tipo:'etapa',texto:'Resgatado de "'+from+'" por '+curName(),autor:curName()});
  logEvent('Pipeline','Resgatou o lead "'+l.nome+'" (de '+from+')',curName());
  save();render();toast('Lead resgatado — agora é seu');
}
function releaseLead(id){
  const l=DB.leads.find(x=>x.id===id);if(!l)return;
  (l.atividade=l.atividade||[]).unshift({ts:nowISO(),tipo:'etapa',texto:'Lead solto por '+curName()+' (voltou para Reativação)',autor:curName()});
  logEvent('Pipeline','Soltou o lead "'+l.nome+'"',l.responsavel);
  l.responsavel='';l.stage='reativ';l.stageSince=daysAgo(0);l.ultimaInteracao=daysAgo(0);
  save();render();toast('Lead liberado para a equipe');
}
function bindDnD(){
  let dragId=null;
  document.querySelectorAll('.lead').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;el.classList.add('drag');e.stopPropagation()});
    el.addEventListener('dragend',()=>{el.classList.remove('drag');document.querySelectorAll('.kbody').forEach(b=>b.classList.remove('drop'))});
  });
  document.querySelectorAll('.kbody').forEach(body=>{
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drop')});
    body.addEventListener('dragleave',()=>body.classList.remove('drop'));
    body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drop');
      const dest=body.dataset.stage;const l=DB.leads.find(x=>x.id===dragId);
      if(l&&l.stage!==dest){moveLeadTo(dragId,dest,false);}});
  });
}

function clientFinance(c){
  const list=DB.contasReceber.filter(x=>x.cliente===c.empresa);
  const sum=s=>list.filter(x=>x.status===s).reduce((a,x)=>a+x.valor,0);
  return {list,recebido:sum('Pago'),aberto:sum('Aberto'),atrasado:sum('Atrasado'),
    previsto:list.filter(x=>x.status!=='Cancelado').reduce((a,x)=>a+x.valor,0)};
}
function filterClient(btn,f){btn.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');

function toggleCheck(id,i){const o=DB.operacoes.find(x=>x.id===id);o.checklist[i].done=!o.checklist[i].done;

/* ============================== FINANCEIRO ============================== */
let finView='movimento';
let finFech={month:monthKey(daysAgo(0))};
function finToggleHTML(){return `<div class="seg" style="margin-bottom:14px">
  <button class="${finView==='movimento'?'on':''}" onclick="finView='movimento';render()">Movimentação</button>
  <button class="${finView==='fechamento'?'on':''}" onclick="finView='fechamento';render()">Fechamento</button></div>`;}
let finFilter={mode:'geral',month:monthKey(daysAgo(0)),from:daysAgo(30),to:daysAgo(0)};
function finInRange(venc){
  if(finFilter.mode==='geral')return true;
  if(finFilter.mode==='mensal')return monthKey(venc)===finFilter.month;
  return venc>=finFilter.from && venc<=finFilter.to;
}
function finMetrics(){
  const cr=vContasReceber().filter(c=>finInRange(c.vencimento));
  const cp=vContasPagar().filter(c=>finInRange(c.vencimento));
  const sum=(a,f)=>a.reduce((s,x)=>s+(f(x)?x.valor:0),0);
  const prevista=sum(cr,x=>x.status!=='Cancelado');
  const recebida=sum(cr,x=>x.status==='Pago');
  const aberta=sum(cr,x=>x.status==='Aberto'||x.status==='Atrasado');
  const atrasadoVal=sum(cr,x=>x.status==='Atrasado');
  const inadCount=new Set(cr.filter(x=>x.status==='Atrasado').map(x=>x.cliente)).size;
  const inadPct=prevista?atrasadoVal/prevista*100:0;
  const despPagas=sum(cp,x=>x.status==='Pago');
  const despFut=sum(cp,x=>x.status!=='Pago'&&x.status!=='Cancelado');
  const lucro=recebida-despPagas;
  const saldo=recebida-despPagas+(DB.saldoAjuste||0);
  const saldoProj=saldo+aberta-despFut;
  const g=metrics();
  return {cr,cp,prevista,recebida,aberta,atrasadoVal,inadCount,inadPct,despPagas,despFut,lucro,saldo,saldoProj,mrr:g.mrr};
}
function finMonths(){
  const set=new Set();[...DB.contasReceber,...DB.contasPagar].forEach(c=>set.add(monthKey(c.vencimento)));
  set.add(monthKey(daysAgo(0)));return [...set].sort().reverse();
}
function finLabel(){
  if(finFilter.mode==='geral')return 'Todos os lançamentos';
  if(finFilter.mode==='mensal')return 'Mês de '+monthLabel(finFilter.month);
  return fmtDate(finFilter.from)+' a '+fmtDate(finFilter.to);
}

function painelAddDiario(uid){const i=document.getElementById('diario_txt');const t=(i&&i.value||'').trim();if(!t)return;const pd=painelData(uid);pd.diario.unshift({ts:nowISO(),texto:t});save();render();toast('Anotação adicionada');}

function painelTaskAdd(pid){
  openModal('Nova tarefa pessoal',`
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Esta tarefa fica só no seu Meu Painel — não aparece na aba Tarefas da equipe.</div>
    <div class="field"><label>Título</label><input id="pt_tit" placeholder="O que você precisa fazer?"></div>
    <div class="field"><label>Comentário / detalhe (opcional)</label><textarea id="pt_desc" placeholder="Anotações sobre a tarefa"></textarea></div>
    <div class="frow2"><div class="field"><label>Prioridade</label><select id="pt_prio"><option>Alta</option><option selected>Média</option><option>Baixa</option></select></div>
      <div class="field"><label>Prazo</label><input id="pt_prazo" type="date" value="${daysAhead(2)}"></div></div>`,
    ()=>{const tit=(document.getElementById('pt_tit').value||'').trim();if(!tit)return;
      const pd=painelData(pid);const desc=(document.getElementById('pt_desc').value||'').trim();
      pd.tarefas.unshift({id:uid(),titulo:tit,descricao:desc,prioridade:document.getElementById('pt_prio').value,
        prazo:document.getElementById('pt_prazo').value,status:'Pendente',
        comentarios:desc?[{ts:nowISO(),texto:desc,autor:curName()}]:[]});
      save();render();toast('Tarefa pessoal criada');},'Criar tarefa');
}

  openDrawer(`<div class="dw-h">

      <div style="flex:1"><h3 style="font-size:17px">${t.titulo}</h3>
        <div style="font-size:12.5px;color:var(--muted);margin-top:2px"><span class="chip chip-acc" style="font-size:10px;padding:1px 6px">pessoal</span> ${fmtDate(t.prazo)}</div></div>
      <button class="x" onclick="closeOverlays()">${ic('x')}</button></div>
    <div class="dw-b">
      <div class="meta">
        <div class="m"><label>Prioridade</label><div><span class="chip chip-${PRIO[t.prioridade]||'mut'}">${t.prioridade}</span></div></div>
        <div class="m"><label>Prazo</label><div>${fmtDate(t.prazo)}</div></div>
      </div>
      ${t.descricao?`<div style="margin-top:16px"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-2);font-weight:600">Detalhe</label><div style="margin-top:6px;font-size:13.5px;line-height:1.5">${t.descricao}</div></div>`:''}
      <div style="margin-top:16px"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-2);font-weight:600">Status</label>
        <select style="width:100%;margin-top:7px;padding:9px 11px;border:1px solid var(--border-2);border-radius:9px;font-family:inherit;font-size:13px" onchange="painelTaskStatus('${pid}','${tid}',this.value)">
          ${['Pendente','Em andamento','Concluída'].map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select></div>
      <div style="margin-top:22px">
        <label style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-2);font-weight:600">Comentários</label>
        <div style="display:flex;gap:8px;margin:10px 0 14px">
          <input id="ptComment" placeholder="Escrever comentário..." style="flex:1;padding:9px 11px;border:1px solid var(--border-2);border-radius:9px;font-family:inherit;font-size:13px" onkeydown="if(event.key==='Enter')painelTaskComment('${pid}','${tid}')">
          <button class="btn btn-acc btn-sm" onclick="painelTaskComment('${pid}','${tid}')">Enviar</button></div>
        <div class="timeline">${(t.comentarios||[]).map(a=>`<div class="tl"><div class="td">${fmtDT(a.ts)} • ${a.autor||'—'}</div><div class="tt">${a.texto}</div></div>`).join('')||'<div style="color:var(--muted);font-size:12.5px">Sem comentários ainda.</div>'}</div>
      </div>
      <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--surface-3);display:flex;gap:9px">
        <button class="btn btn-pri" style="flex:1;justify-content:center" onclick="painelTaskToggle('${pid}','${tid}')">${ic('check')}${done?'Reabrir':'Concluir'}</button>
        <button class="btn" style="color:var(--neg);border-color:var(--neg-soft)" onclick="painelTaskDelete('${pid}','${tid}')">${ic('trash')}Excluir</button></div>
    </div>`);
}
function painelTaskStatus(pid,tid,sv){const pd=painelData(pid);const t=pd.tarefas.find(x=>x.id===tid);if(!t)return;t.status=sv;save();render();openPainelTask(pid,tid);toast('Status atualizado');}
function painelTaskToggle(pid,tid){const pd=painelData(pid);const t=pd.tarefas.find(x=>x.id===tid);if(!t)return;t.status=t.status==='Concluída'?'Pendente':'Concluída';save();render();if(document.getElementById('drawer').classList.contains('on'))openPainelTask(pid,tid);toast(t.status==='Concluída'?'Tarefa concluída':'Tarefa reaberta');}
function painelTaskComment(pid,tid){const i=document.getElementById('ptComment');const v=(i&&i.value||'').trim();if(!v)return;const pd=painelData(pid);const t=pd.tarefas.find(x=>x.id===tid);if(!t)return;t.comentarios=t.comentarios||[];t.comentarios.unshift({ts:nowISO(),texto:v,autor:curName()});save();render();openPainelTask(pid,tid);toast('Comentário adicionado');}
function painelTaskDelete(pid,tid){const pd=painelData(pid);const t=pd.tarefas.find(x=>x.id===tid);if(!t)return;if(!confirm('Excluir a tarefa "'+t.titulo+'"?'))return;pd.tarefas=pd.tarefas.filter(x=>x.id!==tid);save();closeOverlays();render();toast('Tarefa excluída');}
function viewFechamento(v){
  const mk=finFech.month;
  const closed=vClients().filter(c=>c.closedAt&&monthKey(c.closedAt)===mk).sort((a,b)=>(b.closedAt||'').localeCompare(a.closedAt||''));
  const qtd=closed.length, valor=closed.reduce((s,c)=>s+(c.closedValue||0),0);
  const meta=(DB.metasFech&&DB.metasFech[mk])||{qtd:0,valor:0};
  const monthOpts=finMonths().map(k=>`<option value="${k}" ${k===mk?'selected':''}>${monthLabel(k)}</option>`).join('');
  const bar=(lbl,val,goal,fmt)=>{const p=goal?Math.min(100,Math.round(val/goal*100)):0;const c=p>=100?'#0E9D6B':p>=60?'#F5B301':'#2D6BE0';
    return `<div style="flex:1;min-width:200px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--muted);font-weight:500">${lbl}</span><span class="mono-num" style="font-weight:600">${fmt(val)} / ${fmt(goal)} <span style="color:${c}">(${p}%)</span></span></div><div style="height:9px;background:var(--surface-3);border-radius:9px;overflow:hidden"><i style="display:block;height:100%;width:${p}%;background:${c};border-radius:9px"></i></div></div>`;};
  v.innerHTML=`${finToggleHTML()}
    <div class="card" style="padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-size:12.5px;color:var(--muted);font-weight:600">Mês de fechamento</span>
      <select onchange="finFech.month=this.value;render()" style="padding:8px 11px;border:1px solid var(--border-2);border-radius:9px;font-family:inherit;font-size:13px">${monthOpts}</select>
      <span class="chip chip-mut" style="margin-left:auto">Só novos contratos do mês — mensalidades antigas não entram aqui</span>
      ${canSeeAll()?`<button class="btn btn-sm" onclick="openMetaFech('${mk}')">${ic('edit')}Editar meta</button>`:''}
    </div>
    <div class="kpis" style="grid-template-columns:repeat(2,1fr)">
      ${kpi('Novos contratos no mês',qtd,'fire','Fechamentos de '+monthLabel(mk),null)}
      ${kpi('Valor dos novos contratos',BRL(valor),'money','Implantação + 1ª mensalidade',null,true)}
    </div>
    <div class="sec-title">Meta de novos contratos — ${monthLabel(mk)}</div>
    <div class="card" style="padding:18px;display:flex;gap:26px;flex-wrap:wrap">
      ${bar('Qtd. de contratos',qtd,meta.qtd||0,x=>x)}
      ${bar('Valor fechado',valor,meta.valor||0,x=>BRLk(x))}
    </div>
    <div class="sec-title">Contratos fechados em ${monthLabel(mk)}</div>
    <div class="card tw"><table><thead><tr><th>Cliente</th><th>Responsável</th><th>Data</th><th>Valor do contrato</th></tr></thead>
      <tbody>${closed.length?closed.map(c=>`<tr style="cursor:pointer" onclick="openClient('${c.id}')"><td style="font-weight:550">${c.empresa}</td><td>${c.responsavel||'—'}</td><td class="tnum">${fmtDate(c.closedAt)}</td><td class="mono-num" style="font-weight:600">${BRL(c.closedValue||0)}</td></tr>`).join('')
        :'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:22px">Nenhum contrato fechado neste mês.</td></tr>'}</tbody>
      ${closed.length?`<tfoot><tr style="border-top:2px solid var(--border)"><td colspan="3" style="font-weight:600;color:var(--muted)">Total (${qtd})</td><td class="mono-num" style="font-weight:700">${BRL(valor)}</td></tr></tfoot>`:''}</table></div>`;
}
function openMetaFech(mk){
  const meta=(DB.metasFech&&DB.metasFech[mk])||{qtd:0,valor:0};
  openModal('Meta de novos contratos — '+monthLabel(mk),`
    <div class="field"><label>Meta de quantidade de contratos</label><input id="mf_qtd" type="number" value="${meta.qtd||0}"></div>
    <div class="field"><label>Meta de valor fechado (R$)</label><input id="mf_val" type="number" value="${meta.valor||0}"></div>
    <div style="font-size:12px;color:var(--muted)">Vale apenas para ${monthLabel(mk)}. Cada mês tem sua própria meta.</div>`,
    ()=>{DB.metasFech=DB.metasFech||{};DB.metasFech[mk]={qtd:Number(document.getElementById('mf_qtd').value||0),valor:Number(document.getElementById('mf_val').value||0)};
      save();render();toast('Meta de fechamento salva');});
}

        <div class="foot"><span>Recebidas − Despesas pagas</span></div>

function deleteLead(id){
  if(!canSeeAll()){toast('Apenas o CEO pode apagar leads');return;}
  const l=DB.leads.find(x=>x.id===id);if(!l)return;
  if(!confirm('Apagar o lead "'+l.nome+'" do pipeline? Esta ação não pode ser desfeita.'))return;
  DB.leads=DB.leads.filter(x=>x.id!==id);
  logEvent('Pipeline','Apagou o lead "'+l.nome+'"',l.responsavel);
  save();closeOverlays();render();toast('Lead apagado');
}
function setLeadResp(id,nome){const l=DB.leads.find(x=>x.id===id);const old=l.responsavel||'(pool)';l.responsavel=nome;
  (l.atividade=l.atividade||[]).unshift({ts:nowISO(),tipo:'comentario',texto:'Responsável: '+old+' → '+(nome||'(pool)'),autor:curName()});
  logEvent('Pipeline','Atribuiu "'+l.nome+'" a '+(nome||'(pool)'),nome);save();render();openLead(id);toast('Responsável atualizado')}
function addLeadComment(id){const i=document.getElementById('leadComment');const v=i.value.trim();if(!v)return;
  const l=DB.leads.find(x=>x.id===id);(l.atividade=l.atividade||[]).unshift({ts:nowISO(),tipo:'comentario',texto:v,autor:curName()});
  l.ultimaInteracao=daysAgo(0);logEvent('Pipeline','Comentou em "'+l.nome+'"',l.responsavel);save();renderNav();openLead(id);toast('Comentário registrado')}
function moveLead(id,stage){moveLeadTo(id,stage,true)}
function moveLeadTo(id,stage,reopen){
  const l=DB.leads.find(x=>x.id===id);if(!l||l.stage===stage)return;
  if(stage==='perdidos'){promptMotivoPerda(l,()=>commitLeadStage(l,stage,false));return;}
  commitLeadStage(l,stage,reopen);
}
function leadToClient(l,opts){
  opts=opts||{};
  const closedAt=opts.closedAt||daysAgo(0);
  const implant=opts.implantacao||0, mensal=opts.mensal||0;
  const closedValue=(opts.closedValue!=null)?opts.closedValue:(implant+mensal);
  const hist=(l.atividade||[]).map(a=>({ts:a.ts,data:(a.ts||'').slice(0,10),tipo:'Pipeline',texto:a.texto}));
  hist.unshift({ts:nowISO(),data:closedAt,tipo:'Fechamento',texto:'Negócio fechado'+(closedValue?(' — '+BRL(closedValue)):'')+' e movido do pipeline para Clientes.'});
  return {id:uid(),empresa:l.nome,contato:'—',responsavel:l.responsavel||'',
    telefone:l.telefone||'',whatsapp:l.telefone||'',email:'',cidade:'—',especialidade:'—',
    origem:l.origem||'',entrada:closedAt,status:opts.status||'Implantação',saude:60,
    closedAt:closedAt,closedValue:closedValue,
    contrato:{implantacao:implant,mensal:mensal,fechamento:closedValue,assinatura:closedAt,vencimento:daysAhead(365),fidelidadeMeses:0,link:''},
    nota:'',tags:l.tags||[],historico:hist};
}
function fecharNegocio(id){
  const l=DB.leads.find(x=>x.id===id);if(!l)return;
  openModal('Fechar negócio \u{1F389}',`
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5">Confirme os valores do contrato fechado com <b>${l.nome}</b>. O lead sai do pipeline e vira <b>Cliente</b> + <b>Operação</b>, levando todo o histórico de etapas junto.</div>
    <div class="frow2"><div class="field"><label>Valor de implantação (R$)</label><input id="fn_imp" type="number" value="0"></div>
      <div class="field"><label>Valor mensal (R$)</label><input id="fn_men" type="number" value="${l.valor||0}"></div></div>`,
    ()=>{
      const imp=Number(document.getElementById('fn_imp').value||0);
      const men=Number(document.getElementById('fn_men').value||0);
      const cli=leadToClient(l,{status:'Implantação',implantacao:imp,mensal:men,closedValue:imp+men,closedAt:daysAgo(0)});
      DB.clients.unshift(cli);
      DB.leads=DB.leads.filter(x=>x.id!==id);
      ensureOperacao(cli);
      logEvent('Pipeline','Fechou negócio: "'+l.nome+'"'+((imp+men)?(' ('+BRL(imp+men)+')'):''),cli.responsavel);
      logEvent('Clientes','Novo cliente por fechamento: '+cli.empresa,cli.responsavel);
      logEvent('Operações','Implantação iniciada: '+cli.empresa,cli.responsavel);
      save();go('clientes');setTimeout(()=>openClient(cli.id),60);toast('Negócio fechado! Cliente e operação criados.');
    },'Fechar negócio \u2713');
}
function commitLeadStage(l,stage,reopen){
  const from=STAGES.find(s=>s[0]===l.stage)[1];const to=STAGES.find(s=>s[0]===stage)[1];
  l.stage=stage;l.ultimaInteracao=daysAgo(0);l.stageSince=daysAgo(0);
  if(!UNIVERSAL_STAGES.includes(stage)&&!l.responsavel)l.responsavel=curName();
  const extra=(stage==='perdidos'&&l.motivoPerda)?' ('+l.motivoPerda+')':'';
  (l.atividade=l.atividade||[]).unshift({ts:nowISO(),tipo:'etapa',texto:'Etapa: '+from+' → '+to+extra,autor:curName()});
  logEvent('Pipeline','Moveu "'+l.nome+'": '+from+' → '+to+extra,l.responsavel);
  save();render();if(reopen)openLead(l.id);toast('Etapa atualizada');
}
function promptMotivoPerda(l,after){
  const motivos=['Preço','Sem retorno','Escolheu concorrente','Sem perfil/fit','Sem orçamento','Momento ruim','Outro'];
  openModal('Por que perdeu este lead?',`
    <div class="field"><label>Motivo da perda</label><select id="mp_motivo">${motivos.map(m=>`<option>${m}</option>`).join('')}</select></div>
    <div class="field"><label>Observação (opcional)</label><input id="mp_obs" placeholder="Detalhe se quiser"></div>`,
    ()=>{const mo=document.getElementById('mp_motivo').value;const ob=document.getElementById('mp_obs').value.trim();
      l.motivoPerda=mo+(ob?' — '+ob:'');after();},'Marcar como perdido');
}

function setClientResp(id,nome){const c=DB.clients.find(x=>x.id===id);c.responsavel=nome;
  clientLog(c,'Responsável','Responsável definido como '+(nome||'—'));logEvent('Clientes','Atribuiu '+c.empresa+' a '+(nome||'—'),nome);
  save();render();renderClientDrawer(id);toast('Responsável atualizado')}
function setClientStatus(id,status){const c=DB.clients.find(x=>x.id===id);if(c.status===status)return;
  if(status==='Cancelado'){
    const motivos=['Preço/custo','Sem resultado percebido','Mudança de gestão','Dificuldade financeira','Foi para concorrente','Encerrou atividade','Outro'];
    openModal('Por que está cancelando?',`
      <div class="field"><label>Motivo do cancelamento</label><select id="mc_motivo">${motivos.map(m=>`<option>${m}</option>`).join('')}</select></div>
      <div class="field"><label>Observação (opcional)</label><input id="mc_obs" placeholder="Detalhe se quiser"></div>`,
      ()=>{const mo=document.getElementById('mc_motivo').value,ob=document.getElementById('mc_obs').value.trim();
        c.motivoCancel=mo+(ob?' — '+ob:'');c.status='Cancelado';
        clientLog(c,'Cancelamento','Cliente cancelado — '+c.motivoCancel);logEvent('Clientes','Cancelou '+c.empresa+' — '+c.motivoCancel,c.responsavel);
        save();render();renderClientDrawer(id);toast('Cliente cancelado');},'Confirmar cancelamento');
    return;
  }
  c.status=status;clientLog(c,'Status','Status alterado para '+status);logEvent('Clientes',c.empresa+': status → '+status,c.responsavel);
  if(status==='Implantação'&&ensureOperacao(c)){logEvent('Operações','Implantação iniciada: '+c.empresa,c.responsavel);}
  save();render();renderClientDrawer(id);toast('Status atualizado')}

  el.style.cssText='position:fixed;inset:0;z-index:200;background:linear-gradient(155deg,#16273F,#0E1828);display:flex;align-items:center;justify-content:center;padding:20px';
  el.innerHTML=`

        <p style="color:var(--muted);font-size:13px;margin:5px 0 0">${firstRun?'Você será o CEO, com acesso total. Depois cadastre sua equipe na aba Equipe.':'Acesse com seu e-mail e senha.'}</p>
      </div>
      <div style="padding:4px 28px 26px">
        ${firstRun?`
          <div class="field"><label>Nome da empresa</label><input id="au_emp" placeholder="Sua empresa"></div>
          <div class="field"><label>Seu nome</label><input id="au_nome" placeholder="Nome completo"></div>
        `:''}
        <div class="field"><label>E-mail</label><input id="au_email" type="email" placeholder="voce@empresa.com" onkeydown="if(event.key==='Enter')document.getElementById('au_pass').focus()"></div>
        <div class="field"><label>Senha</label><input id="au_pass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doAuth(${firstRun})"></div>
        <div id="au_err" style="color:var(--neg);font-size:12.5px;min-height:16px;margin-bottom:6px"></div>
        <button class="btn btn-acc" style="width:100%;justify-content:center;padding:11px" onclick="doAuth(${firstRun})">${firstRun?'Criar e entrar':'Entrar'}</button>
        ${persistMode!=='firebase'?`<div style="font-size:11.5px;color:var(--muted-2);margin-top:12px;text-align:center;line-height:1.4">${persistMode==='memory'?'Pré-visualização: baixe/hospede o arquivo para salvar de verdade.':'Salvando neste navegador (Firebase desconectado).'}</div>`:''}
      </div>

  setTimeout(()=>{const f=document.getElementById(firstRun?'au_emp':'au_email');if(f)f.focus()},100);

function authErr(msg){const e=document.getElementById('au_err');if(e)e.textContent=msg}
function doAuth(firstRun){
  const email=(document.getElementById('au_email').value||'').trim().toLowerCase();
  const pass=document.getElementById('au_pass').value||'';
  if(firstRun){
    const nome=(document.getElementById('au_nome').value||'').trim();
    const emp=(document.getElementById('au_emp').value||'').trim();
    if(!nome||!email||!pass){authErr('Preencha nome, e-mail e senha.');return;}
    const u={id:uid(),nome,email,senha:pass,perfil:'ceo',ativo:true,permissoes:permsFor('ceo')};
    DB.equipe=[u]; DB.perfil={nome,empresa:emp};
    setSession(u.id); save();
    document.getElementById('auth').style.display='none';
    render(); toast('Conta criada — bem-vindo!');
    return;
  }
  const u=DB.equipe.find(e=>(e.email||'').toLowerCase()===email && e.ativo!==false);
  if(!u||(u.senha||'')!==pass){authErr('E-mail ou senha incorretos.');return;}
  setSession(u.id);
  document.getElementById('auth').style.display='none';
  render(); toast('Bem-vindo, '+u.nome.split(' ')[0]);
}

/* ============================== RELATÓRIO ============================== */
const LOG_AREA_COLOR={'Pipeline':'info','Clientes':'pos','Tarefas':'warn','Agenda':'acc','Financeiro':'warn','Reuniões':'mut','Operações':'info','Equipe':'mut'};
let logFilter='all';
let relPeriod='mes';
function relInPeriod(ds){if(!ds)return false;const d=(ds||'').slice(0,10);
  if(relPeriod==='tudo')return true;
  if(relPeriod==='mes')return monthKey(d)===monthKey(daysAgo(0));
  return d>=daysAgo(30); /* 30d */}
function relLabel(){return relPeriod==='mes'?'Mês atual':relPeriod==='30d'?'Últimos 30 dias':'Todo o período'}
function desempenhoHTML(){
  const users=canSeeAll()?DB.equipe.filter(e=>e.ativo!==false):[curUser()].filter(Boolean);
  const linhas=users.map(u=>{
    const meus=DB.leads.filter(l=>l.responsavel===u.nome);
    const leadsTrab=meus.filter(l=>relInPeriod(l.criado||l.stageSince)).length;
    const fechs=DB.clients.filter(c=>c.closedAt&&c.responsavel===u.nome&&relInPeriod(c.closedAt));
    const valor=fechs.reduce((s,c)=>s+(c.closedValue||0),0);
    const com=valor*(u.comissaoPct||0)/100;
    return {nome:u.nome,perfil:u.perfil,leadsTrab,fech:fechs.length,valor,pct:u.comissaoPct||0,com};
  }).sort((a,b)=>b.valor-a.valor);
  const totalCom=linhas.reduce((s,l)=>s+l.com,0), totalVal=linhas.reduce((s,l)=>s+l.valor,0);
  return `<div class="sec-title">Desempenho da equipe <span style="margin-left:auto;font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">${relLabel()}</span></div>
    <div class="card tw"><table><thead><tr><th>Pessoa</th><th>Cargo</th><th>Leads</th><th>Fechados</th><th>Valor fechado</th><th>Comissão</th></tr></thead>
      <tbody>${linhas.map((l,i)=>`<tr><td style="font-weight:550">${i===0&&l.valor>0?'🏆 ':''}${l.nome}</td><td><span class="chip chip-${PERFIL_COLOR[l.perfil]||'mut'}">${roleLabel(l.perfil)}</span></td>
        <td class="mono-num">${l.leadsTrab}</td><td class="mono-num">${l.fech}</td><td class="mono-num" style="font-weight:600">${BRL(l.valor)}</td>
        <td class="mono-num" style="color:var(--pos);font-weight:600">${l.pct?BRL(l.com)+' ('+l.pct+'%)':'—'}</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Sem dados no período.</td></tr>'}</tbody>
      ${linhas.length?`<tfoot><tr style="border-top:2px solid var(--border)"><td colspan="4" style="font-weight:600;color:var(--muted)">Total</td><td class="mono-num" style="font-weight:700">${BRL(totalVal)}</td><td class="mono-num" style="font-weight:700;color:var(--pos)">${BRL(totalCom)}</td></tr></tfoot>`:''}</table></div>`;
}
function origemHTML(){
  const leads=vLeads();const map={};
  leads.forEach(l=>{const o=l.origem||'—';map[o]=map[o]||{total:0,fech:0};map[o].total++;});
  vClients().filter(c=>c.closedAt).forEach(c=>{const o=c.origem||'—';map[o]=map[o]||{total:0,fech:0};map[o].total++;map[o].fech++;});
  const ent=Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  if(!ent.length)return '';
  const max=Math.max(...ent.map(e=>e[1].total));
  return `<div class="sec-title">Conversão por origem</div>
    <div class="card" style="padding:16px 18px">${ent.map(([o,d])=>{const tx=d.total?Math.round(d.fech/d.total*100):0;
      return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px">
        <span style="font-weight:500">${o}</span><span class="mono-num" style="color:var(--muted)">${d.fech}/${d.total} fechados • <b style="color:${tx>=30?'var(--pos)':'var(--text)'}">${tx}%</b></span></div>
        <div style="height:7px;background:var(--surface-3);border-radius:7px;overflow:hidden;display:flex">
          <i style="display:block;height:100%;width:${d.total/max*100}%;background:#243B5C;border-radius:7px"></i></div></div>`;}).join('')}</div>`;
}
function motivosHTML(){
  const perdas={},cancel={};
  vLeads().filter(l=>l.stage==='perdidos'&&l.motivoPerda).forEach(l=>{const k=l.motivoPerda.split(' — ')[0];perdas[k]=(perdas[k]||0)+1});
  vClients().filter(c=>c.status==='Cancelado'&&c.motivoCancel).forEach(c=>{const k=c.motivoCancel.split(' — ')[0];cancel[k]=(cancel[k]||0)+1});
  const block=(titulo,obj)=>{const ent=Object.entries(obj).sort((a,b)=>b[1]-a[1]);const max=Math.max(1,...ent.map(e=>e[1]));
    return `<div class="card" style="padding:16px 18px;flex:1;min-width:240px">
      <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:10px">${titulo}</div>
      ${ent.length?ent.map(([k,n])=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>${k}</span><span class="mono-num" style="font-weight:600">${n}</span></div>
        <div style="height:6px;background:var(--surface-3);border-radius:6px;overflow:hidden"><i style="display:block;height:100%;width:${n/max*100}%;background:#DD3A2F;border-radius:6px"></i></div></div>`).join('')
        :'<div style="color:var(--muted);font-size:12.5px">Nada registrado ainda.</div>'}</div>`;};
  return `<div class="sec-title">Por que perdemos</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px">${block('Motivos de perda (leads)',perdas)}${block('Motivos de cancelamento (clientes)',cancel)}</div>`;
}

  v.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="seg">
        <button class="${relPeriod==='mes'?'on':''}" onclick="relPeriod='mes';render()">Mês atual</button>

        ${miniStat('Movimentações',all.length)}

        ${miniStat('Áreas ativas',Math.max(0,areas.length-1))}
      </div>
    </div>
    ${desempenhoHTML()}
    ${origemHTML()}
    ${motivosHTML()}
    <div class="sec-title">Linha do tempo</div>
    <div class="seg" style="margin-bottom:14px;flex-wrap:wrap">
      ${areas.map(a=>`<button class="${logFilter===a?'on':''}" onclick="logFilter='${a}';render()">${a==='all'?'Tudo':a}</button>`).join('')}
    </div>
    ${list.length?`<div class="card"><div class="list">${list.map(x=>`
      <div class="li">
        <span class="chip chip-${LOG_AREA_COLOR[x.area]||'mut'}" style="min-width:74px;justify-content:center">${x.area}</span>
        <div style="flex:1;min-width:0"><div style="font-size:13.5px;color:var(--ink)">${x.texto}</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${fmtDT(x.ts)} • por ${x.autor}${x.responsavel&&x.responsavel!==x.autor?' • resp.: '+x.responsavel:''}</div></div>
      </div>`).join('')}</div></div>`
    :'<div class="card"><div class="empty">'+ic('report')+'<div style="font-weight:600;color:var(--ink)">Sem movimentações neste período</div><div style="margin-top:4px">Tente "Tudo" ou registre ações na operação.</div></div></div>'}`;
}

        <button class="btn" style="flex:1" onclick="exportBackup()">${ic('download')}Baixar backup</button>
        <button class="btn" style="flex:1" onclick="document.getElementById('importFile').click()">${ic('upload')}Importar backup</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importBackup(this)">
      </div>
      <button class="btn" onclick="loadSample()">${ic('plus')}Carregar dados de exemplo</button>
      <button class="btn" style="color:var(--neg);border-color:var(--neg-soft)" onclick="clearAll()">${ic('trash')}Limpar todos os dados</button>
    </div>`:''}`,
    ()=>{const u2=curUser();if(u2){u2.nome=document.getElementById('set_nome').value.trim()||u2.nome;}
      DB.perfil=DB.perfil||{};DB.perfil.empresa=document.getElementById('set_emp').value.trim();
      save();render();toast('Configurações salvas');},'Salvar');
}
function csvCell(v){v=(v==null?'':String(v));return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function csvDownload(filename,headers,rows){
  try{const sep=';';const bom='\uFEFF';
    const body=[headers.join(sep)].concat(rows.map(r=>r.map(csvCell).join(sep))).join('\r\n');
    const blob=new Blob([bom+body],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('CSV exportado');
  }catch(e){toast('Falha ao exportar')}
}
function exportClientsCSV(){
  const rows=vClients().map(c=>{const f=clientFinance(c);return [c.empresa,c.contato||'',c.responsavel||'',c.cidade||'',c.especialidade||'',c.status,
    c.contrato.mensal,c.contrato.fidelidadeMeses||0,fmtDate(c.contrato.vencimento),c.saude,f.recebido,f.aberto,f.atrasado,(c.tags||[]).join(', ')]});
  csvDownload('clientes-'+daysAgo(0)+'.csv',
    ['Empresa','Contato','Responsável','Cidade','Especialidade','Status','Mensal','Fidelidade (meses)','Vencimento','Saúde','Recebido','Em aberto','Em atraso','Tags'],rows);
}
function exportFinanceCSV(){
  const m=finMetrics();
  const rows=[];
  m.cr.forEach(c=>rows.push(['Receber',c.cliente,'',c.responsavel||clientOwner(c.cliente)||'',c.valor,fmtDate(c.vencimento),c.status]));
  m.cp.forEach(c=>rows.push(['Pagar',c.descricao,c.categoria,c.responsavel||'',c.valor,fmtDate(c.vencimento),c.status]));
  csvDownload('financeiro-'+daysAgo(0)+'.csv',['Tipo','Descrição/Cliente','Categoria','Responsável','Valor','Vencimento','Status'],rows);
}
function exportBackup(){
  try{const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='crm-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('Backup baixado');
  }catch(e){toast('Falha ao gerar backup')}
}
function importBackup(input){
  const file=input.files&&input.files[0];if(!file)return;
  if(!confirm('Importar este backup vai SUBSTITUIR todos os dados atuais. Continuar?')){input.value='';return;}
  const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.equipe)){toast('Arquivo inválido');return;}
      DB=data;migrate();
      const cur=DB.equipe.find(e=>e.id===session)||DB.equipe.find(e=>e.perfil==='ceo');
      setSession(cur?cur.id:null);save();closeOverlays();
      if(loggedIn())render();else renderAuth();toast('Backup importado');
    }catch(e){toast('Não foi possível ler o arquivo')}};
  r.readAsText(file);input.value='';
}
function loadSample(){
  if(!confirm('Isto substitui TODOS os dados (inclusive a equipe) pelos dados de exemplo. Você continuará logado como CEO. Continuar?'))return;
  DB=sampleData();
  migrate();
  let ceo=DB.equipe.find(e=>e.perfil==='ceo');
  setSession(ceo?ceo.id:null); save();closeOverlays();render();toast('Dados de exemplo carregados');
}
function clearAll(){
  if(!confirm('Isto apaga clientes, leads, tarefas, finanças e relatório. Sua conta e equipe são mantidas. Continuar?'))return;
  const keepEquipe=DB.equipe, keepPerfil=DB.perfil;
  DB=emptyDB(); DB.equipe=keepEquipe; DB.perfil=keepPerfil; save();closeOverlays();render();toast('Dados operacionais apagados');
}
function openSetup(){
  openModal('Bem-vindo 👋',`
    <div style="font-size:13.5px;color:var(--muted);margin-bottom:16px;line-height:1.5">Vamos personalizar seu CRM. Você pode mudar isso depois nas configurações.</div>
    <div class="field"><label>Seu nome</label><input id="su_nome" placeholder="Como quer ser chamado"></div>
    <div class="field"><label>Nome da empresa (opcional)</label><input id="su_emp" placeholder="Sua empresa"></div>`,
    ()=>{DB.perfil={nome:document.getElementById('su_nome').value.trim(),empresa:document.getElementById('su_emp').value.trim()};
      save();render();toast('Tudo pronto!');},'Começar');
}
